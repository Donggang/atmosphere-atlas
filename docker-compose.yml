services:
  db:
    image: postgis/postgis:16-3.4
    container_name: aa-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: atmosphere_atlas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - aa_postgres_data:/var/lib/postgresql/data
      - ./:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atmosphere_atlas"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  aa_postgres_data:
